<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrayLnks Settings</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <nav class="tabs">
      <button class="tab active" data-tab="general">General</button>
      <button class="tab" data-tab="paths">Paths</button>
      <button class="tab" data-tab="cloud">Cloud</button>
      <button class="tab" data-tab="station">Station</button>
      <button class="tab" data-tab="diag">Diagnostics</button>
    </nav>

    <main>
      <!-- General -->
      <section id="general" class="panel active">
        <label class="row">
          <span>Start with Windows</span>
          <input type="checkbox" id="autostart" />
        </label>
        <label class="row">
          <span>Start minimized to tray</span>
          <input type="checkbox" id="startMinimized" />
        </label>
        <p class="hint">Edits are applied when you press Apply.</p>
      </section>

      <!-- Paths -->
      <section id="paths" class="panel">
        <div class="field">
          <label for="watchPath">Local Watch Path</label>
          <div class="pathrow">
            <input type="text" id="watchPath" placeholder="(not set)" readonly />
            <button id="browseWatch">Browse…</button>
          </div>
        </div>
      </section>

      <!-- Cloud -->
      <section id="cloud" class="panel">
        <div class="field">
          <label>Aliyun Drive (阿里云盘)</label>
          <div class="pathrow">
            <span id="cloudConnStatus" class="hint">Not connected</span>
            <button id="cloudAuthBtn">Authorize…</button>
            <button id="cloudReauthBtn" hidden>Re-authorize</button>
            <button id="cloudDisconnectBtn" hidden>Disconnect</button>
          </div>
          <img id="qrImg" alt="QR code" hidden style="max-width: 220px; border-radius: 6px" />
          <p id="qrHint" class="hint" hidden></p>
        </div>
        <div class="field">
          <label for="cloudFolder">Cloud folder</label>
          <div class="pathrow">
            <input type="text" id="cloudFolder" list="cloudFolderList" placeholder="/TrayLnks" disabled />
            <button id="cloudRefreshFolders" disabled>List folders</button>
          </div>
          <datalist id="cloudFolderList"></datalist>
          <p class="hint">Absolute path in the drive to mirror against the watch path. Created on first sync if missing.</p>
        </div>
        <div class="field">
          <label for="cloudInterval">Refresh interval</label>
          <select id="cloudInterval">
            <option value="15">every 15 min</option>
            <option value="30" selected>every 30 min</option>
            <option value="60">every 60 min</option>
            <option value="120">every 2 h</option>
          </select>
        </div>
        <label class="row">
          <span>Enable automatic sync</span>
          <input type="checkbox" id="cloudEnable" />
        </label>
        <div class="pathrow">
          <button id="syncNowBtn" class="primary">Sync now</button>
          <span id="cloudStatusLine" class="hint"></span>
        </div>
      </section>

      <!-- Station -->
      <section id="station" class="panel">
        <p class="hint">This computer's hostname (used for <code>.station</code> filtering):</p>
        <div class="pathrow">
          <input type="text" id="hostname" readonly />
          <button id="copyHost">Copy</button>
        </div>
      </section>

      <!-- Diagnostics -->
      <section id="diag" class="panel">
        <dl id="diagList"></dl>
        <button id="refreshNow">Refresh menu now</button>
      </section>
    </main>

    <footer class="footer">
      <span id="footerStatus" class="hint"></span>
      <div class="footer-actions">
        <button id="cancelBtn">Cancel</button>
        <button id="applyBtn" class="primary">Apply</button>
      </div>
    </footer>
  </div>
  <script src="settings.js"></script>
</body>
</html>
